<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <radialGradient id="sphereGlow" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.8" />
      <stop offset="60%" stop-color="#4F46E5" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#9333EA" stop-opacity="0.1" />
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Glowing background -->
  <circle cx="100" cy="100" r="70" fill="url(#sphereGlow)">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite" />
  </circle>

  <!-- Orbiting Lines -->
  <g stroke="#06B6D4" stroke-width="1.5" fill="none" opacity="0.6">
    <ellipse cx="100" cy="100" rx="80" ry="30" transform="rotate(30 100 100)">
      <animateTransform attributeName="transform" type="rotate" from="30 100 100" to="390 100 100" dur="8s" repeatCount="indefinite" />
    </ellipse>
    <ellipse cx="100" cy="100" rx="80" ry="30" transform="rotate(150 100 100)">
      <animateTransform attributeName="transform" type="rotate" from="150 100 100" to="510 100 100" dur="8s" repeatCount="indefinite" />
    </ellipse>
    <ellipse cx="100" cy="100" rx="75" ry="75" stroke-dasharray="4 8" stroke-width="2" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="-360 100 100" dur="15s" repeatCount="indefinite" />
    </ellipse>
  </g>

  <!-- Nodes -->
  <g fill="#06B6D4">
    <circle cx="100" cy="20" r="4">
      <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="8s" repeatCount="indefinite" />
    </circle>
    <circle cx="100" cy="180" r="4">
      <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="8s" repeatCount="indefinite" />
    </circle>
    <circle cx="20" cy="100" r="3" fill="#9333EA">
      <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="-360 100 100" dur="12s" repeatCount="indefinite" />
    </circle>
    <circle cx="180" cy="100" r="3" fill="#9333EA">
      <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="-360 100 100" dur="12s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Question Mark -->
  <text x="100" y="125" font-family="'Inter', sans-serif" font-weight="900" font-size="72" fill="#FFFFFF" text-anchor="middle" filter="url(#glow)">
    ?
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite" />
  </text>
</svg>
